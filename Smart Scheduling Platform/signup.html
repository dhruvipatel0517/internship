<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchedSmart - Sign Up</title>
    <link rel="stylesheet" href="signup.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="signup-container">
        <div class="logo">
            <i class="fas fa-bolt"></i> <span>SchedSmart</span>
        </div>

        <div class="signup-card">
            <h2>Get Started</h2>
            <p class="subtitle">Create your account</p>

            <form>
                <div class="input-group">
                    <i class="far fa-user"></i>
                    <input type="text" placeholder="Enter your Name" required>
                </div>

                <div class="input-group">
                    <i class="far fa-envelope"></i>
                    <input type="email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Enter your password" required>
                    <i class="far fa-eye toggle-password"></i>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Enter your password" required>
                    <i class="far fa-eye toggle-password"></i>
                </div>

                <div class="terms-row">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to the <a href="#">Terms of Services & Privacy Policy</a></label>
                </div>

                <button type="submit" class="signup-btn">Sign Up</button>
            </form>

            <p class="login-text">Already have an account ? <a href="#">Log In</a></p>

            <div class="divider">
                <span>or</span>
            </div>

            <button class="social-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
                Continue with Google
            </button>

            <button class="social-btn">
                <i class="fab fa-apple"></i>
                Continue with Apple
            </button>
        </div>
    </div>

</body>
</html>
